name: hulee-chat

x-app-base: &app-base
  image: ${HULEE_IMAGE:?HULEE_IMAGE is required}
  env_file:
    - .env
  environment:
    NODE_ENV: production
    DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
    HULEE_DEPLOYMENT_TYPE: ${HULEE_DEPLOYMENT_TYPE:-saas_shared}
    HULEE_LOG_LEVEL: ${HULEE_LOG_LEVEL:-info}
    HULEE_INTERNAL_API_SECRET: ${HULEE_INTERNAL_API_SECRET:?HULEE_INTERNAL_API_SECRET is required}
    HULEE_PUBLIC_BASE_URL: ${HULEE_PUBLIC_BASE_URL:?HULEE_PUBLIC_BASE_URL is required}
    HULEE_PUBLIC_WEBHOOK_BASE_URL: ${HULEE_PUBLIC_WEBHOOK_BASE_URL:?HULEE_PUBLIC_WEBHOOK_BASE_URL is required}
  restart: unless-stopped
  depends_on:
    postgres:
      condition: service_healthy

services:
  postgres:
    image: postgres:16-alpine
    container_name: hulee_chat_postgres
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-hulee}
      POSTGRES_USER: ${POSTGRES_USER:-hulee}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  migrate:
    <<: *app-base
    container_name: hulee_chat_migrate
    restart: "no"
    command: ["pnpm", "db:migrate"]

  seed:
    <<: *app-base
    container_name: hulee_chat_seed
    restart: "no"
    profiles:
      - bootstrap
    command: ["pnpm", "db:seed:mvp"]

  api:
    <<: *app-base
    container_name: hulee_chat_api
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      HULEE_DEPLOYMENT_TYPE: ${HULEE_DEPLOYMENT_TYPE:-saas_shared}
      HULEE_LOG_LEVEL: ${HULEE_LOG_LEVEL:-info}
      HULEE_INTERNAL_API_SECRET: ${HULEE_INTERNAL_API_SECRET:?HULEE_INTERNAL_API_SECRET is required}
      HULEE_PUBLIC_BASE_URL: ${HULEE_PUBLIC_BASE_URL:?HULEE_PUBLIC_BASE_URL is required}
      HULEE_PUBLIC_WEBHOOK_BASE_URL: ${HULEE_PUBLIC_WEBHOOK_BASE_URL:?HULEE_PUBLIC_WEBHOOK_BASE_URL is required}
      HULEE_API_HOST: 0.0.0.0
      HULEE_API_PORT: 3000
    command: ["pnpm", "--filter", "@hulee/api", "start"]
    networks:
      - default
      - web
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'node -e "fetch(''http://127.0.0.1:3000/internal/v1/health'').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"'
        ]
      interval: 10s
      timeout: 5s
      retries: 12

  worker:
    <<: *app-base
    container_name: hulee_chat_worker
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      HULEE_DEPLOYMENT_TYPE: ${HULEE_DEPLOYMENT_TYPE:-saas_shared}
      HULEE_LOG_LEVEL: ${HULEE_LOG_LEVEL:-info}
      HULEE_INTERNAL_API_SECRET: ${HULEE_INTERNAL_API_SECRET:?HULEE_INTERNAL_API_SECRET is required}
      HULEE_PUBLIC_BASE_URL: ${HULEE_PUBLIC_BASE_URL:?HULEE_PUBLIC_BASE_URL is required}
      HULEE_PUBLIC_WEBHOOK_BASE_URL: ${HULEE_PUBLIC_WEBHOOK_BASE_URL:?HULEE_PUBLIC_WEBHOOK_BASE_URL is required}
      HULEE_WORKER_FEATURES: ${HULEE_WORKER_FEATURES:-core}
    command: ["pnpm", "--filter", "@hulee/worker", "start"]

  egress-gateway:
    image: ${HULEE_EGRESS_GATEWAY_IMAGE:-qmcgaw/gluetun:v3.40}
    container_name: hulee_chat_vpn_gateway
    profiles:
      - provider-egress
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    sysctls:
      net.ipv6.conf.all.disable_ipv6: "0"
    env_file:
      - .env
    environment:
      # gluetun-compatible gateway image envs.
      VPN_SERVICE_PROVIDER: ${HULEE_EGRESS_VPN_SERVICE_PROVIDER:-nordvpn}
      VPN_TYPE: ${HULEE_EGRESS_VPN_TYPE:-openvpn}
      OPENVPN_USER: ${HULEE_EGRESS_OPENVPN_USER:-}
      OPENVPN_PASSWORD: ${HULEE_EGRESS_OPENVPN_PASSWORD:-}
      SERVER_COUNTRIES: ${HULEE_EGRESS_SERVER_COUNTRIES:-Netherlands}
      OPENVPN_PROTOCOL: ${HULEE_EGRESS_OPENVPN_PROTOCOL:-udp}
      DNS_KEEP_NAMESERVER: ${HULEE_EGRESS_DNS_KEEP_NAMESERVER:-off}
      DNS_UPSTREAM_RESOLVER_TYPE: ${HULEE_EGRESS_DNS_UPSTREAM_RESOLVER_TYPE:-dot}
      DNS_UPSTREAM_RESOLVERS: ${HULEE_EGRESS_DNS_UPSTREAM_RESOLVERS:-cloudflare}
      DNS_CACHING: ${HULEE_EGRESS_DNS_CACHING:-on}
      DNS_UPSTREAM_IPV6: ${HULEE_EGRESS_DNS_UPSTREAM_IPV6:-off}
      FIREWALL_OUTBOUND_SUBNETS: ${HULEE_EGRESS_FIREWALL_OUTBOUND_SUBNETS:-172.16.0.0/12,10.0.0.0/8,192.168.0.0/16}
      # Bridge-compatible NordVPN gateway image envs.
      NORDVPN_TOKEN: ${HULEE_EGRESS_NORDVPN_TOKEN:-}
      NORDVPN_TECHNOLOGY: ${HULEE_EGRESS_NORDVPN_TECHNOLOGY:-}
      NORDVPN_COUNTRY: ${HULEE_EGRESS_NORDVPN_COUNTRY:-}
      NORDVPN_TARGETS: ${HULEE_EGRESS_NORDVPN_TARGETS:-}
      NORDVPN_HEALTHCHECK_URLS: ${HULEE_EGRESS_NORDVPN_HEALTHCHECK_URLS:-}
      NORDVPN_RECONNECT_AFTER_FAILURES: ${HULEE_EGRESS_NORDVPN_RECONNECT_AFTER_FAILURES:-3}
      NORDVPN_RECONNECT_COOLDOWN_SECONDS: ${HULEE_EGRESS_NORDVPN_RECONNECT_COOLDOWN_SECONDS:-300}
      NORDVPN_HEALTHCHECK_TIMEOUT_SECONDS: ${HULEE_EGRESS_NORDVPN_HEALTHCHECK_TIMEOUT_SECONDS:-8}
      NORDVPN_LOG_PREFIX: hulee_chat_vpn_gateway
      NORDVPN_ALLOW_SUBNETS: ${HULEE_EGRESS_NORDVPN_ALLOW_SUBNETS:-172.16.0.0/12,10.0.0.0/8,192.168.0.0/16}
      NORDVPN_ALLOW_PORTS: ${HULEE_EGRESS_NORDVPN_ALLOW_PORTS:-}
      NORDVPN_KILL_SWITCH: ${HULEE_EGRESS_NORDVPN_KILL_SWITCH:-}
      NORDVPN_LAN_DISCOVERY: ${HULEE_EGRESS_NORDVPN_LAN_DISCOVERY:-}
    networks:
      - default
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'if command -v nordvpn >/dev/null 2>&1; then timeout 8s nordvpn status | grep -q ''Status: Connected''; else wget -q --spider "$${HULEE_EGRESS_HEALTHCHECK_URL:-https://www.gstatic.com/generate_204}"; fi'
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped

  worker-provider-egress:
    <<: *app-base
    container_name: hulee_chat_worker_provider_egress
    profiles:
      - provider-egress
    network_mode: "service:egress-gateway"
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      HULEE_DEPLOYMENT_TYPE: ${HULEE_DEPLOYMENT_TYPE:-saas_shared}
      HULEE_LOG_LEVEL: ${HULEE_LOG_LEVEL:-info}
      HULEE_INTERNAL_API_SECRET: ${HULEE_INTERNAL_API_SECRET:?HULEE_INTERNAL_API_SECRET is required}
      HULEE_PUBLIC_BASE_URL: ${HULEE_PUBLIC_BASE_URL:?HULEE_PUBLIC_BASE_URL is required}
      HULEE_PUBLIC_WEBHOOK_BASE_URL: ${HULEE_PUBLIC_WEBHOOK_BASE_URL:?HULEE_PUBLIC_WEBHOOK_BASE_URL is required}
      HULEE_WORKER_FEATURES: ${HULEE_PROVIDER_EGRESS_WORKER_FEATURES:-telegram_bot,telegram_user,whatsapp_user,whatsapp_official}
      HULEE_EGRESS_PROFILE_ID: ${HULEE_PROVIDER_EGRESS_PROFILE_ID:-hulee_chat_vpn_gateway}
      HULEE_EGRESS_PROFILE_KIND: vpn_namespace
      HULEE_EGRESS_PROFILE_STATUS: ${HULEE_PROVIDER_EGRESS_PROFILE_STATUS:-ready}
      HULEE_EGRESS_OPERATOR_HINT: ${HULEE_PROVIDER_EGRESS_OPERATOR_HINT:-Provider traffic is routed through hulee_chat_vpn_gateway.}
      HULEE_PROVIDER_EGRESS_POSTGRES_HOST: ${HULEE_PROVIDER_EGRESS_POSTGRES_HOST:-}
      HULEE_PROVIDER_EGRESS_API_HOST: ${HULEE_PROVIDER_EGRESS_API_HOST:-}
    depends_on:
      postgres:
        condition: service_healthy
      egress-gateway:
        condition: service_healthy
    command:
      [
        "sh",
        "-lc",
        "if [ -n \"$${HULEE_PROVIDER_EGRESS_POSTGRES_HOST:-}\" ]; then printf '%s postgres\\n' \"$${HULEE_PROVIDER_EGRESS_POSTGRES_HOST}\" >> /etc/hosts; fi; if [ -n \"$${HULEE_PROVIDER_EGRESS_API_HOST:-}\" ]; then printf '%s api\\n' \"$${HULEE_PROVIDER_EGRESS_API_HOST}\" >> /etc/hosts; fi; exec pnpm --filter @hulee/worker start"
      ]

  web:
    <<: *app-base
    container_name: hulee_chat_web
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      HULEE_DEPLOYMENT_TYPE: ${HULEE_DEPLOYMENT_TYPE:-saas_shared}
      HULEE_LOG_LEVEL: ${HULEE_LOG_LEVEL:-info}
      HULEE_INTERNAL_API_SECRET: ${HULEE_INTERNAL_API_SECRET:?HULEE_INTERNAL_API_SECRET is required}
      HULEE_PUBLIC_BASE_URL: ${HULEE_PUBLIC_BASE_URL:?HULEE_PUBLIC_BASE_URL is required}
      HULEE_PUBLIC_WEBHOOK_BASE_URL: ${HULEE_PUBLIC_WEBHOOK_BASE_URL:?HULEE_PUBLIC_WEBHOOK_BASE_URL is required}
      HULEE_INTERNAL_API_BASE_URL: http://api:3000
      HULEE_WEB_TENANT_ID: ${HULEE_WEB_TENANT_ID:-tenant_local_1}
      HULEE_WEB_EMPLOYEE_ID: ${HULEE_WEB_EMPLOYEE_ID:-employee:local-dev}
    command: ["pnpm", "--filter", "@hulee/web", "start"]
    networks:
      - default
      - web
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'node -e "fetch(''http://127.0.0.1:3000/'').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"'
        ]
      interval: 10s
      timeout: 5s
      retries: 12

volumes:
  postgres-data:

networks:
  web:
    external: true
