services:
  postgres:
    image: postgres:16-alpine
    container_name: hulee-postgres
    environment:
      POSTGRES_DB: ${HULEE_POSTGRES_DB:-hulee}
      POSTGRES_USER: ${HULEE_POSTGRES_USER:-hulee}
      POSTGRES_PASSWORD: ${HULEE_POSTGRES_PASSWORD:-hulee}
    ports:
      - "${HULEE_POSTGRES_PORT:-5432}:5432"
    volumes:
      - hulee-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: hulee-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${HULEE_MINIO_ROOT_USER:-hulee}
      MINIO_ROOT_PASSWORD: ${HULEE_MINIO_ROOT_PASSWORD:-hulee-local-secret}
    ports:
      - "${HULEE_MINIO_API_PORT:-9000}:9000"
      - "${HULEE_MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - hulee-minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  minio-create-bucket:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    container_name: hulee-minio-create-bucket
    depends_on:
      minio:
        condition: service_healthy
    environment:
      HULEE_MINIO_BUCKET: ${HULEE_MINIO_BUCKET:-hulee-files}
      HULEE_MINIO_ROOT_USER: ${HULEE_MINIO_ROOT_USER:-hulee}
      HULEE_MINIO_ROOT_PASSWORD: ${HULEE_MINIO_ROOT_PASSWORD:-hulee-local-secret}
    entrypoint:
      - /bin/sh
      - -c
      - |
        mc alias set hulee http://minio:9000 "$${HULEE_MINIO_ROOT_USER}" "$${HULEE_MINIO_ROOT_PASSWORD}"
        mc mb --ignore-existing "hulee/$${HULEE_MINIO_BUCKET}"
    restart: "no"

volumes:
  hulee-postgres-data:
  hulee-minio-data:
