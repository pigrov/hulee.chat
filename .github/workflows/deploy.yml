name: Deploy

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/hulee.chat

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm check

      - name: Log in to GHCR for push
        run: echo "${{ github.token }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build and push image
        run: |
          docker build \
            -f deploy/docker/Dockerfile \
            -t "$IMAGE_NAME:${{ github.sha }}" \
            -t "$IMAGE_NAME:latest" \
            .
          docker push "$IMAGE_NAME:${{ github.sha }}"
          docker push "$IMAGE_NAME:latest"

      - name: Configure SSH
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "${{ vars.DEPLOY_PORT }}" -H "${{ vars.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Preflight server
        run: |
          ssh -i ~/.ssh/deploy_key \
            -p "${{ vars.DEPLOY_PORT }}" \
            "${{ vars.DEPLOY_USER }}@${{ vars.DEPLOY_HOST }}" \
            "test -d '${{ vars.DEPLOY_PATH }}' && test -f '${{ vars.DEPLOY_PATH }}/.env' && docker network inspect web >/dev/null"

      - name: Upload compose files
        run: |
          scp -i ~/.ssh/deploy_key -P "${{ vars.DEPLOY_PORT }}" \
            deploy/production/docker-compose.yml \
            "${{ vars.DEPLOY_USER }}@${{ vars.DEPLOY_HOST }}:${{ vars.DEPLOY_PATH }}/docker-compose.yml"
          scp -i ~/.ssh/deploy_key -P "${{ vars.DEPLOY_PORT }}" \
            deploy/production/env.example \
            "${{ vars.DEPLOY_USER }}@${{ vars.DEPLOY_HOST }}:${{ vars.DEPLOY_PATH }}/env.example"

      - name: Write release environment
        run: |
          ssh -i ~/.ssh/deploy_key \
            -p "${{ vars.DEPLOY_PORT }}" \
            "${{ vars.DEPLOY_USER }}@${{ vars.DEPLOY_HOST }}" \
            "cat > '${{ vars.DEPLOY_PATH }}/.release.env'" <<EOF
          HULEE_IMAGE=$IMAGE_NAME:${{ github.sha }}
          HULEE_PUBLIC_BASE_URL=${{ vars.HULEE_PUBLIC_BASE_URL }}
          HULEE_PUBLIC_WEBHOOK_BASE_URL=${{ vars.HULEE_PUBLIC_WEBHOOK_BASE_URL }}
          EOF

      - name: Deploy on server
        run: |
          ssh -T -i ~/.ssh/deploy_key \
            -p "${{ vars.DEPLOY_PORT }}" \
            "${{ vars.DEPLOY_USER }}@${{ vars.DEPLOY_HOST }}" \
            "bash -s" <<'EOF'
          set -euo pipefail
          cd '${{ vars.DEPLOY_PATH }}'
          printf '%s' '${{ secrets.GHCR_TOKEN }}' | docker login ghcr.io -u '${{ github.repository_owner }}' --password-stdin >/dev/null
          expected_image='${{ env.IMAGE_NAME }}:${{ github.sha }}'
          provider_egress_enabled=false
          if grep -Eiq '^[[:space:]]*HULEE_PROVIDER_EGRESS_ENABLED[[:space:]]*=[[:space:]]*(true|1|yes)[[:space:]]*$' .env; then
            provider_egress_enabled=true
          fi
          if [ "$provider_egress_enabled" = true ] && [ ! -c /dev/net/tun ]; then
            echo "Provider egress is enabled, but /dev/net/tun is not available on the host." >&2
            exit 1
          fi
          compose=(docker compose --env-file .env --env-file .release.env -f docker-compose.yml)
          core_services=(postgres api worker web)
          pull_services=(postgres api worker web)
          image_containers=(hulee_chat_api hulee_chat_web hulee_chat_worker)
          if [ "$provider_egress_enabled" = true ]; then
            compose+=(--profile provider-egress)
            pull_services+=(worker-provider-egress)
            image_containers+=(hulee_chat_worker_provider_egress)
            egress_gateway_image=$(grep -E '^[[:space:]]*HULEE_EGRESS_GATEWAY_IMAGE[[:space:]]*=' .env | tail -n 1 | cut -d= -f2- | xargs || true)
            egress_gateway_image=${egress_gateway_image:-qmcgaw/gluetun:v3.40}
            if [[ "$egress_gateway_image" == */* ]]; then
              echo "Pulling registry egress gateway image: $egress_gateway_image"
              pull_services+=(egress-gateway)
            elif docker image inspect "$egress_gateway_image" >/dev/null 2>&1; then
              echo "Using existing egress gateway image on server: $egress_gateway_image"
            else
              echo "Egress gateway image is not present locally: $egress_gateway_image" >&2
              echo "Build or pull it on the server before enabling provider egress." >&2
              exit 1
            fi
          fi
          "${compose[@]}" pull "${pull_services[@]}"
          "${compose[@]}" run --rm -T migrate </dev/null
          "${compose[@]}" up -d --force-recreate --wait --wait-timeout 180 "${core_services[@]}"
          if [ "$provider_egress_enabled" = true ]; then
            postgres_ip=$(docker inspect --format '{{with index .NetworkSettings.Networks "hulee-chat_default"}}{{.IPAddress}}{{end}}' hulee_chat_postgres)
            api_ip=$(docker inspect --format '{{with index .NetworkSettings.Networks "hulee-chat_default"}}{{.IPAddress}}{{end}}' hulee_chat_api)
            if [ -z "$postgres_ip" ] || [ -z "$api_ip" ]; then
              echo "Could not resolve provider egress internal hosts: postgres=$postgres_ip api=$api_ip" >&2
              exit 1
            fi
            cat > .provider-egress.env <<PROVIDER_EGRESS_ENV
          HULEE_PROVIDER_EGRESS_POSTGRES_HOST=$postgres_ip
          HULEE_PROVIDER_EGRESS_API_HOST=$api_ip
          PROVIDER_EGRESS_ENV
            compose+=(--env-file .provider-egress.env)
            "${compose[@]}" up -d --force-recreate --wait --wait-timeout 180 egress-gateway
            "${compose[@]}" up -d --force-recreate --no-deps --wait --wait-timeout 180 worker-provider-egress
          fi
          for container in "${image_containers[@]}"; do
            actual_image=$(docker inspect --format '{{.Config.Image}}' "$container")
            if [ "$actual_image" != "$expected_image" ]; then
              echo "$container is running $actual_image, expected $expected_image" >&2
              exit 1
            fi
          done
          "${compose[@]}" ps
          EOF

      - name: Smoke internal API
        run: |
          ssh -T -i ~/.ssh/deploy_key \
            -p "${{ vars.DEPLOY_PORT }}" \
            "${{ vars.DEPLOY_USER }}@${{ vars.DEPLOY_HOST }}" \
            "bash -s" <<'EOF'
          set -euo pipefail
          cd '${{ vars.DEPLOY_PATH }}'
          for attempt in $(seq 1 30); do
            if docker exec hulee_chat_api node -e "fetch('http://127.0.0.1:3000/internal/v1/health').then(async r => { if (!r.ok) process.exit(1); console.log(await r.text()); }).catch(() => process.exit(1))"; then
              exit 0
            fi
            docker compose --env-file .env --env-file .release.env -f docker-compose.yml ps || true
            sleep 5
          done
          docker logs --tail=100 hulee_chat_api || true
          exit 1
          EOF
