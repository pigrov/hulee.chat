server {
  listen 80;
  server_name chat.hulee.ru;

  location ^~ /.well-known/acme-challenge/ {
    root /var/www/certbot;
    default_type "text/plain";
    try_files $uri =404;
  }

  location / {
    return 301 https://$host$request_uri;
  }
}

server {
  listen 443 ssl;
  http2 on;
  server_name chat.hulee.ru;

  ssl_certificate     /etc/letsencrypt/live/chat.hulee.ru/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/chat.hulee.ru/privkey.pem;

  resolver 127.0.0.11 ipv6=off valid=30s;
  set $hulee_chat_upstream hulee_chat_web:3000;

  location ^~ /.well-known/acme-challenge/ {
    root /var/www/certbot;
    default_type "text/plain";
    try_files $uri =404;
  }

  location / {
    proxy_pass http://$hulee_chat_upstream;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;

    client_max_body_size 100m;
    proxy_read_timeout 3600;
    proxy_send_timeout 3600;
  }
}
