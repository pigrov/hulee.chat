name: Deploy (Inbox V2 only)

on:
  workflow_run:
    workflows:
      - Check
    types:
      - completed
    branches:
      - main

concurrency:
  group: production-deploy
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/hulee.chat
  TARGET_SHA: ${{ github.event.workflow_run.head_sha }}

jobs:
  deploy:
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main' &&
      github.event.workflow_run.head_repository.full_name == github.repository
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.TARGET_SHA }}

      - name: Refuse a superseded main revision
        run: |
          latest_main_sha=$(git ls-remote origin refs/heads/main | cut -f1)
          if [ -z "$latest_main_sha" ] || [ "$latest_main_sha" != "$TARGET_SHA" ]; then
            echo "::error::Checked revision $TARGET_SHA is no longer the current main revision ($latest_main_sha)."
            exit 1
          fi

      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm check

      - name: Log in to GHCR for push
        run: echo "${{ github.token }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build and push image
        run: |
          docker build \
            --build-arg "HULEE_BUILD_REVISION=${{ env.TARGET_SHA }}" \
            --build-arg "HULEE_SCHEMA_EPOCH=preproduction-inbox-v2-1" \
            -f deploy/docker/Dockerfile \
            -t "$IMAGE_NAME:${{ env.TARGET_SHA }}" \
            .
          docker push "$IMAGE_NAME:${{ env.TARGET_SHA }}"

      - name: Configure SSH
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "${{ vars.DEPLOY_PORT }}" -H "${{ vars.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Preflight server
        run: |
          ssh -i ~/.ssh/deploy_key \
            -p "${{ vars.DEPLOY_PORT }}" \
            "${{ vars.DEPLOY_USER }}@${{ vars.DEPLOY_HOST }}" \
            "test -d '${{ vars.DEPLOY_PATH }}' && test -f '${{ vars.DEPLOY_PATH }}/.env' && docker network inspect web >/dev/null"

      - name: Upload compose files
        run: |
          scp -i ~/.ssh/deploy_key -P "${{ vars.DEPLOY_PORT }}" \
            deploy/production/docker-compose.yml \
            "${{ vars.DEPLOY_USER }}@${{ vars.DEPLOY_HOST }}:${{ vars.DEPLOY_PATH }}/docker-compose.yml"
          scp -i ~/.ssh/deploy_key -P "${{ vars.DEPLOY_PORT }}" \
            deploy/production/env.example \
            "${{ vars.DEPLOY_USER }}@${{ vars.DEPLOY_HOST }}:${{ vars.DEPLOY_PATH }}/env.example"

      - name: Write release environment
        run: |
          ssh -i ~/.ssh/deploy_key \
            -p "${{ vars.DEPLOY_PORT }}" \
            "${{ vars.DEPLOY_USER }}@${{ vars.DEPLOY_HOST }}" \
            "cat > '${{ vars.DEPLOY_PATH }}/.release.env'" <<EOF
          HULEE_IMAGE=$IMAGE_NAME:${{ env.TARGET_SHA }}
          HULEE_PUBLIC_BASE_URL=${{ vars.HULEE_PUBLIC_BASE_URL }}
          HULEE_PUBLIC_WEBHOOK_BASE_URL=${{ vars.HULEE_PUBLIC_WEBHOOK_BASE_URL }}
          EOF

      - name: Deploy on server
        run: |
          ssh -T -i ~/.ssh/deploy_key \
            -p "${{ vars.DEPLOY_PORT }}" \
            "${{ vars.DEPLOY_USER }}@${{ vars.DEPLOY_HOST }}" \
            "bash -s" <<'EOF'
          set -euo pipefail
          cd '${{ vars.DEPLOY_PATH }}'
          printf '%s' '${{ secrets.GHCR_TOKEN }}' | docker login ghcr.io -u '${{ github.repository_owner }}' --password-stdin >/dev/null
          expected_image='${{ env.IMAGE_NAME }}:${{ env.TARGET_SHA }}'
          expected_revision='${{ env.TARGET_SHA }}'
          expected_epoch='preproduction-inbox-v2-1'
          ensure_env_var() {
            local key="$1"
            local value="$2"
            if ! grep -Eq "^[[:space:]]*${key}[[:space:]]*=[[:space:]]*[^[:space:]#]" .env; then
              printf '\n%s=%s\n' "$key" "$value" >> .env
            fi
          }
          random_secret() {
            if command -v openssl >/dev/null 2>&1; then
              openssl rand -hex 32
            else
              head -c 32 /dev/urandom | od -An -tx1 | tr -d ' \n'
            fi
          }
          ensure_env_var HULEE_OBJECT_STORAGE_ENDPOINT http://minio:9000
          ensure_env_var HULEE_OBJECT_STORAGE_REGION us-east-1
          ensure_env_var HULEE_OBJECT_STORAGE_BUCKET hulee-files
          ensure_env_var HULEE_OBJECT_STORAGE_ACCESS_KEY_ID hulee
          if ! grep -Eq '^[[:space:]]*HULEE_OBJECT_STORAGE_SECRET_ACCESS_KEY[[:space:]]*=[[:space:]]*[^[:space:]#]' .env; then
            ensure_env_var HULEE_OBJECT_STORAGE_SECRET_ACCESS_KEY "$(random_secret)"
          fi
          ensure_env_var HULEE_OBJECT_STORAGE_FORCE_PATH_STYLE true
          for retired_bootstrap_key in HULEE_SEED_API_KEY HULEE_PLATFORM_ADMIN_PASS; do
            if grep -Eq "^[[:space:]]*${retired_bootstrap_key}[[:space:]]*=" .env; then
              echo "$retired_bootstrap_key is a one-time foundation credential and must not remain in the runtime environment." >&2
              exit 1
            fi
          done
          legacy_provider_egress_enabled=$(grep -E '^[[:space:]]*HULEE_PROVIDER_EGRESS_ENABLED[[:space:]]*=' .env | tail -n 1 | cut -d= -f2- | sed 's/[[:space:]]*#.*$//' | tr '[:upper:]' '[:lower:]' | tr -d '[:space:]' || true)
          if [[ "$legacy_provider_egress_enabled" =~ ^(true|1|yes)$ ]]; then
            echo "Legacy provider egress is enabled in .env. INB2-CLEAN-002 requires it to stay disabled until an Inbox V2 adapter is reviewed." >&2
            exit 1
          fi
          configured_worker_features=$(grep -E '^[[:space:]]*HULEE_WORKER_FEATURES[[:space:]]*=' .env | tail -n 1 | cut -d= -f2- | sed 's/[[:space:]]*#.*$//' | tr -d '[:space:]' || true)
          if [ -n "$configured_worker_features" ] && [ "$configured_worker_features" != "core" ]; then
            echo "Production HULEE_WORKER_FEATURES must be exactly core during the Inbox V2 clean-slate rebuild." >&2
            exit 1
          fi
          for stale_container in hulee_chat_worker_provider_egress hulee_chat_vpn_gateway; do
            if docker container inspect "$stale_container" >/dev/null 2>&1; then
              echo "Legacy provider runtime container $stale_container still exists. Complete the INB2-CLEAN-002 drain and remove it before deployment." >&2
              exit 1
            fi
          done
          allowed_hulee_containers='^(hulee_chat_postgres|hulee_chat_minio|hulee_chat_minio_create_bucket|hulee_chat_migrate|hulee_chat_seed|hulee_chat_api|hulee_chat_worker|hulee_chat_web|hulee_site)$'
          while IFS=$'\t' read -r container_name container_image; do
            if [[ "$container_image" == '${{ env.IMAGE_NAME }}:'* ]] &&
               [[ ! "$container_name" =~ $allowed_hulee_containers ]]; then
              echo "Unreviewed Hulee image container $container_name ($container_image) must be removed before deployment." >&2
              exit 1
            fi
          done < <(docker ps -a --format '{{.Names}}\t{{.Image}}')
          allowed_compose_services='^(postgres|minio|minio-create-bucket|migrate|seed|api|worker|web|site)$'
          while IFS= read -r container_id; do
            [ -z "$container_id" ] && continue
            compose_service=$(docker inspect --format '{{index .Config.Labels "com.docker.compose.service"}}' "$container_id")
            if [[ ! "$compose_service" =~ $allowed_compose_services ]]; then
              echo "Unreviewed hulee-chat Compose service $compose_service remains attached to the project." >&2
              exit 1
            fi
          done < <(docker ps -aq --filter label=com.docker.compose.project=hulee-chat)
          for stale_runtime in hulee_chat_api hulee_chat_worker hulee_chat_web; do
            if docker container inspect "$stale_runtime" >/dev/null 2>&1; then
              docker update --restart=no "$stale_runtime" >/dev/null
              docker stop --time 30 "$stale_runtime" >/dev/null
              docker rm "$stale_runtime" >/dev/null
            fi
          done
          compose=(docker compose --env-file .env --env-file .release.env -f docker-compose.yml)
          core_services=(postgres minio minio-create-bucket api worker web site)
          pull_services=(postgres minio minio-create-bucket api worker web site)
          image_containers=(hulee_chat_api hulee_chat_web hulee_chat_worker hulee_site)
          "${compose[@]}" pull "${pull_services[@]}"
          "${compose[@]}" run --rm -T migrate </dev/null
          "${compose[@]}" up -d --force-recreate --wait --wait-timeout 180 "${core_services[@]}"
          for container in "${image_containers[@]}"; do
            actual_image=$(docker inspect --format '{{.Config.Image}}' "$container")
            if [ "$actual_image" != "$expected_image" ]; then
              echo "$container is running $actual_image, expected $expected_image" >&2
              exit 1
            fi
            actual_revision=$(docker inspect --format '{{index .Config.Labels "org.opencontainers.image.revision"}}' "$container")
            actual_epoch=$(docker inspect --format '{{index .Config.Labels "io.hulee.schema-epoch"}}' "$container")
            if [ "$actual_revision" != "$expected_revision" ] || [ "$actual_epoch" != "$expected_epoch" ]; then
              echo "$container has revision=$actual_revision epoch=$actual_epoch; expected revision=$expected_revision epoch=$expected_epoch" >&2
              exit 1
            fi
          done
          "${compose[@]}" ps
          EOF

      - name: Smoke API and worker epoch
        run: |
          ssh -T -i ~/.ssh/deploy_key \
            -p "${{ vars.DEPLOY_PORT }}" \
            "${{ vars.DEPLOY_USER }}@${{ vars.DEPLOY_HOST }}" \
            "bash -s" <<'EOF'
          set -euo pipefail
          cd '${{ vars.DEPLOY_PATH }}'
          expected_revision='${{ env.TARGET_SHA }}'
          api_ready=false
          for attempt in $(seq 1 30); do
            if docker exec -e EXPECTED_REVISION="$expected_revision" hulee_chat_api node -e "fetch('http://127.0.0.1:3000/internal/v1/health').then(async r => { const body = await r.json(); if (!r.ok || body.schemaEpoch !== 'preproduction-inbox-v2-1' || body.migrationCount !== 1 || body.buildRevision !== process.env.EXPECTED_REVISION) process.exit(1); console.log(JSON.stringify(body)); }).catch(() => process.exit(1))"; then
              api_ready=true
              break
            fi
            docker compose --env-file .env --env-file .release.env -f docker-compose.yml ps || true
            sleep 5
          done
          if [ "$api_ready" != "true" ]; then
            docker logs --tail=100 hulee_chat_api || true
            exit 1
          fi
          worker_ready=false
          for attempt in $(seq 1 30); do
            worker_logs=$(docker logs --tail=200 hulee_chat_worker 2>&1 || true)
            if grep -Fq '"message":"worker.schema_epoch_verified"' <<<"$worker_logs" &&
               grep -Fq '"epoch":"preproduction-inbox-v2-1"' <<<"$worker_logs" &&
               grep -Fq '"message":"worker.started"' <<<"$worker_logs" &&
               grep -Fq '"workerFeatures":["core"]' <<<"$worker_logs" &&
               grep -Fq '"egressProfileKind":"disabled"' <<<"$worker_logs" &&
               grep -Fq '"egressProfileStatus":"unavailable"' <<<"$worker_logs" &&
               grep -Fq '"egressProbesEnabled":false' <<<"$worker_logs"; then
              worker_ready=true
              break
            fi
            sleep 2
          done
          if [ "$worker_ready" != "true" ]; then
            printf '%s\n' "$worker_logs"
            exit 1
          fi
          EOF
