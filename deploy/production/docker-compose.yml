name: hulee-chat

x-app-base: &app-base
  image: ${HULEE_IMAGE:?HULEE_IMAGE is required}
  env_file:
    - .env
  environment:
    NODE_ENV: production
    DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
    HULEE_DEPLOYMENT_TYPE: ${HULEE_DEPLOYMENT_TYPE:-saas_shared}
    HULEE_LOG_LEVEL: ${HULEE_LOG_LEVEL:-info}
    HULEE_INTERNAL_API_SECRET: ${HULEE_INTERNAL_API_SECRET:?HULEE_INTERNAL_API_SECRET is required}
    HULEE_PUBLIC_BASE_URL: ${HULEE_PUBLIC_BASE_URL:?HULEE_PUBLIC_BASE_URL is required}
    HULEE_PUBLIC_WEBHOOK_BASE_URL: ${HULEE_PUBLIC_WEBHOOK_BASE_URL:?HULEE_PUBLIC_WEBHOOK_BASE_URL is required}
    HULEE_SCHEMA_EPOCH: preproduction-inbox-v2-1
  restart: unless-stopped
  depends_on:
    postgres:
      condition: service_healthy

services:
  postgres:
    image: postgres:16-alpine
    container_name: hulee_chat_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-hulee}
      POSTGRES_USER: ${POSTGRES_USER:-hulee}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: hulee_chat_minio
    environment:
      MINIO_ROOT_USER: ${HULEE_OBJECT_STORAGE_ACCESS_KEY_ID:-hulee}
      MINIO_ROOT_PASSWORD: ${HULEE_OBJECT_STORAGE_SECRET_ACCESS_KEY:-hulee-local-secret}
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  minio-create-bucket:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    container_name: hulee_chat_minio_create_bucket
    environment:
      HULEE_OBJECT_STORAGE_BUCKET: ${HULEE_OBJECT_STORAGE_BUCKET:-hulee-files}
      HULEE_OBJECT_STORAGE_ACCESS_KEY_ID: ${HULEE_OBJECT_STORAGE_ACCESS_KEY_ID:-hulee}
      HULEE_OBJECT_STORAGE_SECRET_ACCESS_KEY: ${HULEE_OBJECT_STORAGE_SECRET_ACCESS_KEY:-hulee-local-secret}
    depends_on:
      minio:
        condition: service_healthy
    entrypoint:
      - /bin/sh
      - -c
      - |
        mc alias set hulee http://minio:9000 "$${HULEE_OBJECT_STORAGE_ACCESS_KEY_ID}" "$${HULEE_OBJECT_STORAGE_SECRET_ACCESS_KEY}"
        mc mb --ignore-existing "hulee/$${HULEE_OBJECT_STORAGE_BUCKET}"
    restart: "no"

  migrate:
    <<: *app-base
    container_name: hulee_chat_migrate
    restart: "no"
    command: ["pnpm", "db:migrate"]

  seed:
    <<: *app-base
    container_name: hulee_chat_seed
    restart: "no"
    profiles:
      - bootstrap
    command: ["pnpm", "db:seed:foundation"]

  api:
    <<: *app-base
    container_name: hulee_chat_api
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      HULEE_DEPLOYMENT_TYPE: ${HULEE_DEPLOYMENT_TYPE:-saas_shared}
      HULEE_LOG_LEVEL: ${HULEE_LOG_LEVEL:-info}
      HULEE_INTERNAL_API_SECRET: ${HULEE_INTERNAL_API_SECRET:?HULEE_INTERNAL_API_SECRET is required}
      HULEE_PUBLIC_BASE_URL: ${HULEE_PUBLIC_BASE_URL:?HULEE_PUBLIC_BASE_URL is required}
      HULEE_PUBLIC_WEBHOOK_BASE_URL: ${HULEE_PUBLIC_WEBHOOK_BASE_URL:?HULEE_PUBLIC_WEBHOOK_BASE_URL is required}
      HULEE_SCHEMA_EPOCH: preproduction-inbox-v2-1
      HULEE_EGRESS_PROFILE_ID: deployment:clean-slate-provider-disabled
      HULEE_EGRESS_PROFILE_KIND: disabled
      HULEE_EGRESS_PROFILE_STATUS: unavailable
      HULEE_EGRESS_OPERATOR_HINT: Provider egress is disabled until a reviewed Inbox V2 adapter activation.
      HULEE_EGRESS_PROBES_ENABLED: "false"
      HULEE_API_HOST: 0.0.0.0
      HULEE_API_PORT: 3000
    command: ["pnpm", "--filter", "@hulee/api", "start"]
    networks:
      - default
      - web
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'node -e "fetch(''http://127.0.0.1:3000/internal/v1/health'').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"'
        ]
      interval: 10s
      timeout: 5s
      retries: 12

  worker:
    <<: *app-base
    container_name: hulee_chat_worker
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      HULEE_DEPLOYMENT_TYPE: ${HULEE_DEPLOYMENT_TYPE:-saas_shared}
      HULEE_LOG_LEVEL: ${HULEE_LOG_LEVEL:-info}
      HULEE_INTERNAL_API_SECRET: ${HULEE_INTERNAL_API_SECRET:?HULEE_INTERNAL_API_SECRET is required}
      HULEE_PUBLIC_BASE_URL: ${HULEE_PUBLIC_BASE_URL:?HULEE_PUBLIC_BASE_URL is required}
      HULEE_PUBLIC_WEBHOOK_BASE_URL: ${HULEE_PUBLIC_WEBHOOK_BASE_URL:?HULEE_PUBLIC_WEBHOOK_BASE_URL is required}
      HULEE_SCHEMA_EPOCH: preproduction-inbox-v2-1
      HULEE_WORKER_FEATURES: core
      HULEE_EGRESS_PROFILE_ID: deployment:clean-slate-provider-disabled
      HULEE_EGRESS_PROFILE_KIND: disabled
      HULEE_EGRESS_PROFILE_STATUS: unavailable
      HULEE_EGRESS_OPERATOR_HINT: Provider egress is disabled until a reviewed Inbox V2 adapter activation.
      HULEE_EGRESS_PROBES_ENABLED: "false"
    command: ["pnpm", "--filter", "@hulee/worker", "start"]
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-create-bucket:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "tr '\\0' ' ' </proc/1/cmdline | grep -q -- '@hulee/worker'"
        ]
      interval: 10s
      timeout: 5s
      retries: 12

  web:
    <<: *app-base
    container_name: hulee_chat_web
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      HULEE_DEPLOYMENT_TYPE: ${HULEE_DEPLOYMENT_TYPE:-saas_shared}
      HULEE_LOG_LEVEL: ${HULEE_LOG_LEVEL:-info}
      HULEE_INTERNAL_API_SECRET: ${HULEE_INTERNAL_API_SECRET:?HULEE_INTERNAL_API_SECRET is required}
      HULEE_PUBLIC_BASE_URL: ${HULEE_PUBLIC_BASE_URL:?HULEE_PUBLIC_BASE_URL is required}
      HULEE_PUBLIC_WEBHOOK_BASE_URL: ${HULEE_PUBLIC_WEBHOOK_BASE_URL:?HULEE_PUBLIC_WEBHOOK_BASE_URL is required}
      HULEE_SCHEMA_EPOCH: preproduction-inbox-v2-1
      HULEE_INTERNAL_API_BASE_URL: http://api:3000
      HULEE_WEB_TENANT_ID: ${HULEE_WEB_TENANT_ID:-tenant_local_1}
      HULEE_WEB_EMPLOYEE_ID: ${HULEE_WEB_EMPLOYEE_ID:-employee_local_1}
    command: ["pnpm", "--filter", "@hulee/web", "start"]
    networks:
      - default
      - web
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'node -e "fetch(''http://127.0.0.1:3000/'').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"'
        ]
      interval: 10s
      timeout: 5s
      retries: 12

  site:
    image: ${HULEE_IMAGE:?HULEE_IMAGE is required}
    container_name: hulee_site
    environment:
      NODE_ENV: production
      HULEE_SITE_BASE_URL: ${HULEE_SITE_BASE_URL:-https://hulee.ru}
    command: ["pnpm", "--filter", "@hulee/site", "start"]
    networks:
      - default
      - web
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'node -e "fetch(''http://127.0.0.1:3000/'').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"'
        ]
      interval: 10s
      timeout: 5s
      retries: 12

volumes:
  postgres-data:
  minio-data:

networks:
  web:
    external: true
